name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Cancel superseded runs on the same PR / branch, but allow different
# refs to run concurrently. Cross-ref isolation is provided at the hyco
# level by e2e/azrelay's per-invocation provisioning, so no global lock
# is required.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mock:
    name: E2E (mock)
    runs-on: ubuntu-latest
    # The mock backend does not need OIDC; explicitly drop
    # id-token: write so PR-supplied code (`make build` /
    # `make e2e-mock`) cannot mint an OIDC token using the
    # workflow-level grant inherited from `permissions:` above.
    permissions:
      contents: read
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build
        run: make build

      - name: Run E2E (mock backend)
        run: make e2e-mock

  e2e-azure:
    name: E2E (azure)
    runs-on: ubuntu-latest
    environment: e2e-azure
    # Budget: full Azure suite measured at ~40 min locally (2400 s)
    # with both entra+sas axes. LongLivedConnection contributes
    # ~4 min of pure sleep per axis. 60 min leaves headroom for cold
    # starts, relay slowness, and the occasional retry without
    # tipping into job-level timeout flakes.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # The CI service principal has resource-scoped RBAC on the
          # relay namespace but no subscription-level Reader, so
          # `az login` (which enumerates subscriptions via ARM) fails
          # with "No subscriptions found". `allow-no-subscriptions`
          # lets `az login` succeed tenant-only, and `subscription-id`
          # is omitted because azure/login would otherwise run
          # `az account set --subscription <id>` against an empty
          # local cache, which also fails. AZURE_SUBSCRIPTION_ID is
          # still passed explicitly to the ARM clients via the test
          # step's `env:` block below.
          allow-no-subscriptions: true

      - name: Build
        run: make build

      - name: Run E2E (azure backend)
        env:
          E2E_RELAY_NAME: ${{ vars.E2E_RELAY_NAME }}
          E2E_RESOURCE_GROUP: ${{ vars.E2E_RESOURCE_GROUP || 'aztunnel-e2e' }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: make e2e-azure
