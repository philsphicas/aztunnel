name: CI

on:
  push:
    branches: [main, "dependabot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Build
        run: make build

      - name: Verify root module is go-installable
        run: make check-installable

      - name: Build mockrelay
        run: make -C mockrelay build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Test mockrelay
        run: go test -race ./...
        working-directory: mockrelay

      - name: Test e2e (non-e2e-tagged) with coverage
        run: go test -race -coverprofile=coverage-e2e.txt ./...
        working-directory: e2e

      - name: Coverage summary
        run: |
          echo "=== root module ==="
          go tool cover -func=coverage.txt
          echo "=== e2e module ==="
          go tool cover -func=e2e/coverage-e2e.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.txt
            e2e/coverage-e2e.txt

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: prettier
        run: npx --yes prettier --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: golangci-lint (mockrelay)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: mockrelay

      - name: golangci-lint (e2e)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: e2e

      - name: golangci-lint (e2e/infra)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: e2e/infra

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: govulncheck
        run: make vulncheck

      - name: govulncheck (mockrelay)
        run: make -C mockrelay vulncheck
