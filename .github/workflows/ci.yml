name: CI

on:
  push:
    branches: [main, "dependabot/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build
        run: make build

      - name: Build mockrelay
        run: make -C mockrelay build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.txt ./...

      - name: Test mockrelay
        run: go test -race ./...
        working-directory: mockrelay

      - name: E2E mock-backend scenarios
        run: make e2e-mock

      - name: Coverage summary
        run: go tool cover -func=coverage.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: prettier
        run: npx --yes prettier --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: golangci-lint (mockrelay)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: mockrelay

      - name: golangci-lint (e2e/infra)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: e2e/infra

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: govulncheck
        run: make vulncheck

      - name: govulncheck (mockrelay)
        run: make -C mockrelay vulncheck
